<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Benny Jackson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@400;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --text: #f0ece4;
      --text-muted: #7a7570;
      --accent: #4ae7e7;
      --border: rgba(255, 255, 255, 0.06);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.8;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 900;
      font-size: 17px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1;
      display: inline-block;
      transform: scaleX(1.30);
      transform-origin: left center;
      white-space: nowrap;
      color: var(--text);
      text-decoration: none;
    }

    /* ── CONTENT ── */
    .content {
      padding: 140px 48px 100px;
      max-width: 900px;
      margin: 0 auto;
    }

    .content-eyebrow {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 24px;
    }

    .content-title {
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 900;
      font-size: clamp(48px, 8vw, 80px);
      line-height: 0.85;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      display: inline-block;
      transform: scaleX(1.30);
      transform-origin: left center;
      color: var(--text);
      margin-bottom: 48px;
    }

    .content-body {
      font-size: 16px;
      color: var(--text);
      line-height: 1.9;
    }

    .content-body p {
      margin-bottom: 24px;
    }

    .contact-email {
      font-size: 18px;
      color: var(--accent);
      text-decoration: none;
      transition: color 0.3s ease;
      word-break: break-all;
    }

    .contact-email:hover {
      color: var(--text);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 0.5px solid var(--border);
      padding: 32px 48px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .content {
        padding: 120px 32px 80px;
      }

      .site-nav {
        padding: 0 32px;
      }
    }

    @media (max-width: 600px) {
      .content {
        padding: 100px 20px 60px;
      }

      .content-title {
        font-size: clamp(36px, 10vw, 60px);
      }

      .content-body {
        font-size: 15px;
      }

      .site-nav {
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-logo" href="/">← Back</a>
</nav>

<main>
  <section class="content">
    <p class="content-eyebrow">Get in Touch</p>
    <h1 class="content-title">Contact</h1>

    <div class="content-body">
      <p>Interested in talking about a project? Have a collaboration in mind? Or just want to discuss ideas?</p>
      
      <p><a href="mailto:bennyjackson@me.com" class="contact-email">bennyjackson@me.com</a></p>
    </div>
  </section>
</main>

<footer>
  <p>Based in Kentucky. Always thinking.</p>
</footer>

</body>
</html>
