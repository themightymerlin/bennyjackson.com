<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/bennyjackson.com/">
  <title>Carl's Jr. — Benny Jackson</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --text: #f0ece4;
      --text-muted: #7a7570;
      --accent: #4ae7e7;
      --accent-dim: #2a9b9b;
      --border: rgba(255, 255, 255, 0.06);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(10px);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }

    .header-back {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s ease;
      cursor: pointer;
    }

    .header-back:hover {
      color: var(--accent);
    }

    .header-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.02em;
      text-transform: uppercase;
    }

    .header-spacer {
      width: 60px;
    }

    /* ── MAIN CONTENT ── */
    main {
      padding-top: 60px;
    }

    /* ── GRID VIEW ── */
    .grid-view {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      padding: 120px 48px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* First two videos: 3 columns each (2 per row) */
    .video-card:nth-child(-n+2) {
      grid-column: span 3;
    }

    /* Remaining videos: 2 columns each (3 per row) */
    .video-card:nth-child(n+3) {
      grid-column: span 2;
    }

    .video-card {
      aspect-ratio: 16 / 9;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      transition: all 0.4s cubic-bezier(0.76, 0, 0.24, 1);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .video-card:hover {
      border-color: var(--accent);
      transform: scale(1.02);
    }

    .video-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(10, 10, 10, 0.95), transparent);
      padding: 32px 24px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
    }

    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 64px;
      height: 64px;
      background: rgba(74, 231, 231, 0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: all 0.3s ease;
      font-size: 24px;
    }

    .video-card:hover .play-icon {
      opacity: 1;
      background: rgba(74, 231, 231, 0.4);
    }

    /* ── PLAYER VIEW ── */
    .player-view {
      display: none;
      min-height: 100vh;
      background: var(--bg);
      padding: 120px 48px 48px;
    }

    .player-view.is-active {
      display: block;
      animation: fadeIn 0.4s cubic-bezier(0.76, 0, 0.24, 1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .video-player-container {
      max-width: 1400px;
      margin: 0 auto 80px;
      position: relative;
      aspect-ratio: 16 / 9;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 4px;
      overflow: hidden;
    }

    .video-player-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── FILMSTRIP ── */
    .filmstrip-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .filmstrip-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 24px;
      display: block;
    }

    .filmstrip {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-behavior: smooth;
      padding-bottom: 16px;
    }

    .filmstrip::-webkit-scrollbar {
      height: 4px;
    }

    .filmstrip::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 2px;
    }

    .filmstrip::-webkit-scrollbar-thumb {
      background: rgba(74, 231, 231, 0.3);
      border-radius: 2px;
    }

    .filmstrip::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    .filmstrip-item {
      flex: 0 0 auto;
      width: 200px;
      aspect-ratio: 16 / 9;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      border: 2px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
    }

    .filmstrip-item:hover {
      border-color: var(--accent);
    }

    .filmstrip-item.is-active {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(74, 231, 231, 0.3);
    }

    .filmstrip-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .filmstrip-item-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(10, 10, 10, 0.95), transparent);
      padding: 16px 12px 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .filmstrip-item:hover .filmstrip-item-label {
      opacity: 1;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1000px) {
      .grid-view {
        grid-template-columns: repeat(4, 1fr);
      }

      .video-card:nth-child(-n+2) {
        grid-column: span 2;
      }

      .video-card:nth-child(n+3) {
        grid-column: span 4;
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 0 24px;
      }

      .header-title {
        font-size: 18px;
      }

      .grid-view {
        grid-template-columns: 1fr;
        padding: 100px 24px;
        gap: 8px;
      }

      .video-card:nth-child(-n+2),
      .video-card:nth-child(n+3) {
        grid-column: span 1;
      }

      .player-view {
        padding: 100px 24px 24px;
      }

      .video-player-container {
        margin-bottom: 60px;
      }

      .filmstrip-item {
        min-width: 150px;
      }
    }
  </style>
</head>
<body>

<header class="header">
  <a class="header-back" onclick="goBack()">← Back</a>
  <h1 class="header-title">Carl's Jr.</h1>
  <div class="header-spacer"></div>
</header>

<main>
  <!-- GRID VIEW -->
  <div class="grid-view" id="gridView">
    <!-- Videos will be generated here -->
  </div>

  <!-- PLAYER VIEW -->
  <div class="player-view" id="playerView">
    <div class="video-player-container">
      <iframe id="videoPlayer" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" frameborder="0"></iframe>
    </div>
    
    <div class="filmstrip-container">
      <div class="filmstrip" id="filmstrip">
        <!-- Filmstrip items will be generated here -->
      </div>
    </div>
  </div>
</main>

<script>
  const videos = [
    {
      id: '256425904',
      title: 'Open Sesame',
      thumbnail: 'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781311282/thumb-21_o8xzux.jpg'
    },
    {
      id: '268587582',
      title: 'Pretty Penny',
      thumbnail: 'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781311402/thumb-22_ytdtyp.jpg'
    },
    {
      id: '256425383',
      title: 'Whoa Nelly',
      thumbnail: 'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781311497/thumb-23_agbg8y.jpg'
    },
    {
      id: '274776586',
      title: 'Pure Temptation',
      thumbnail: 'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781311594/thumb-24_mexkil.jpg'
    },
    {
      id: '274776502',
      title: 'Devils Trance',
      thumbnail: 'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781311690/thumb-25_tr95hi.jpg'
    }
  ];

  let currentVideoIndex = 0;

  function initializeGrid() {
    const gridView = document.getElementById('gridView');
    gridView.innerHTML = videos.map((video, index) => `
      <div class="video-card" onclick="playVideo(${index})">
        <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
        <div class="play-icon">▶</div>
        <div class="video-card-label">${video.title}</div>
      </div>
    `).join('');
  }

  function initializeFilmstrip() {
    const filmstrip = document.getElementById('filmstrip');
    filmstrip.innerHTML = videos.map((video, index) => `
      <div class="filmstrip-item ${index === 0 ? 'is-active' : ''}" onclick="switchVideo(${index})">
        <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
        <div class="filmstrip-item-label">${video.title}</div>
      </div>
    `).join('');
  }

  function playVideo(index) {
    currentVideoIndex = index;
    document.getElementById('gridView').style.display = 'none';
    document.getElementById('playerView').classList.add('is-active');
    updatePlayer();
    updateFilmstrip();
  }

  function switchVideo(index) {
    currentVideoIndex = index;
    updatePlayer();
    updateFilmstrip();
  }

  function updatePlayer() {
    const video = videos[currentVideoIndex];
    const videoPlayer = document.getElementById('videoPlayer');
    videoPlayer.src = `https://player.vimeo.com/video/${video.id}?badge=0&autopause=0&player_id=0&app_id=58479`;
  }

  function updateFilmstrip() {
    const filmstripItems = document.querySelectorAll('.filmstrip-item');
    filmstripItems.forEach((item, index) => {
      if (index === currentVideoIndex) {
        item.classList.add('is-active');
      } else {
        item.classList.remove('is-active');
      }
    });
    
    // Auto-scroll filmstrip to show active item
    const activeItem = filmstripItems[currentVideoIndex];
    if (activeItem) {
      activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  }

  function goBack() {
    if (document.getElementById('playerView').classList.contains('is-active')) {
      document.getElementById('playerView').classList.remove('is-active');
      document.getElementById('gridView').style.display = 'grid';
    } else {
      window.location.href = '/';
    }
  }

  // Initialize on load
  window.addEventListener('DOMContentLoaded', () => {
    initializeGrid();
    initializeFilmstrip();
  });
</script>

</body>
</html>
