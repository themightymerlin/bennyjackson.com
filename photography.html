<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography — Benny Jackson</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@400;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0a0a;
      --text: #f0ece4;
      --text-muted: #7a7570;
      --accent: #4ae7e7;
      --border: rgba(255, 255, 255, 0.06);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.8;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 48px;
      height: 64px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-weight: 900;
      font-size: 17px;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      line-height: 1;
      display: inline-block;
      transform: scaleX(1.30);
      transform-origin: left center;
      white-space: nowrap;
      color: var(--text);
      text-decoration: none;
    }

    /* ── INTRO ── */
    .intro {
      padding: 120px 48px 80px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .intro-eyebrow {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .intro-statement {
      font-size: 18px;
      color: var(--text);
      max-width: 700px;
      line-height: 1.9;
      font-weight: 300;
    }

    /* ── GALLERY GRID ── */
    .gallery {
      padding: 0 48px 100px;
      max-width: 100%;
      margin: 0 auto;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2px;
      grid-auto-rows: 300px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      background: var(--bg);
      cursor: pointer;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.3s ease;
      filter: brightness(0.95);
    }

    .gallery-item:hover img {
      transform: scale(1.03);
      filter: brightness(1);
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      padding: 24px;
    }

    .lightbox.active {
      display: flex;
      opacity: 1;
    }

    .lightbox-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      width: auto;
      height: auto;
    }

    .lightbox-close {
      position: absolute;
      top: 24px;
      right: 24px;
      font-size: 28px;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
      transition: color 0.2s;
      z-index: 10;
    }

    .lightbox-close:hover {
      color: var(--text);
    }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--accent);
      cursor: pointer;
      font-size: 20px;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      border-radius: 2px;
    }

    .lightbox-nav:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent);
    }

    .lightbox-prev {
      left: 24px;
    }

    .lightbox-next {
      right: 24px;
    }

    .lightbox-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 0.5px solid var(--border);
      padding: 32px 48px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .intro {
        padding: 100px 32px 60px;
      }

      .gallery {
        padding: 0 32px 80px;
      }

      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 2px;
        grid-auto-rows: 250px;
      }

      .site-nav {
        padding: 0 32px;
      }
    }

    @media (max-width: 600px) {
      .intro {
        padding: 100px 20px 50px;
      }

      .intro-statement {
        font-size: 16px;
      }

      .gallery {
        padding: 0 20px 60px;
      }

      .gallery-grid {
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 2px;
        grid-auto-rows: 180px;
      }

      .site-nav {
        padding: 0 20px;
      }

      .lightbox-nav {
        width: 40px;
        height: 40px;
        font-size: 16px;
      }

      .lightbox-prev {
        left: 12px;
      }

      .lightbox-next {
        right: 12px;
      }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-logo" href="/">← Back</a>
</nav>

<main>
  <!-- INTRO -->
  <section class="intro">
    <p class="intro-eyebrow">Personal Work</p>
    <p class="intro-statement">A visual collection of my past experiences.</p>
  </section>

  <!-- GALLERY -->
  <section class="gallery">
    <div class="gallery-grid" id="galleryGrid"></div>
  </section>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div class="lightbox-container">
    <img class="lightbox-img" id="lightboxImg" src="" alt="">
    <button class="lightbox-nav lightbox-prev" onclick="prevImage()">‹</button>
    <button class="lightbox-nav lightbox-next" onclick="nextImage()">›</button>
    <div class="lightbox-counter"><span id="currentIndex">1</span> / <span id="totalCount">1</span></div>
  </div>
</div>

<footer>
  <p>Photography by Benny Jackson.</p>
</footer>

<script>
  const images = [
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314456/SA3.jpg_gscspn.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314645/DSC07983_2.jpg_ffrosu.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314639/DSC00833-2.jpg_ocnpbc.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314633/DSC02284.jpg_qkfhqr.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314627/SA7.jpg_xi8taa.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314621/DSC09811.jpg_k6biww.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314615/SA8.jpg_mdu6tv.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314608/DSC02417.jpg_wxjm1b.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314602/SA6.jpg_ueisiv.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314596/DSC00930.jpg_tabjxt.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314590/DSC06926.jpg_xjsm3n.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314584/bennyjackson-9.jpg_cjr7p7.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314578/SA4.jpg_ha1fdt.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314572/27079955821_36eaedd92c_o.jpg_wuawvu.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314566/DSC00401.jpg_hma1c3.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314560/SA9.jpg_n1rnsi.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314554/DSC09900.jpg_jvcxjp.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314541/SA-2.jpg_aq0wsm.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314535/DSC00683.jpg_sqbzij.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314547/DSC05542.jpg_uidsck.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314529/SA2.jpg_ntmfac.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314523/DSC05895.jpg_jvx9be.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314516/26797665630_491b2ab841_o.jpg_quuydy.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314510/DSC02103.jpg_veqg0m.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314504/van.jpg_ys4y05.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314498/26056636730_56e420af10_o.jpg_pm2j9c.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314492/27665382042_fdb63e70b7_o.jpg_rsjbak.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314486/26571755661_e81d62b57d_o.jpg_li2fz1.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314480/26544234543_c027ab2b75_o.jpg_lyvsjh.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314474/27363042500_9cf2a3d649_o.jpg_phjdom.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314468/DSC00639.jpg_hxe6er.webp',
    'https://res.cloudinary.com/dx8kswwgb/image/upload/v1781314461/DSC02301.jpg_rvel3b.webp'
  ];

  let currentImageIndex = 0;

  function buildGallery() {
    const grid = document.getElementById('galleryGrid');
    images.forEach((src, index) => {
      const item = document.createElement('div');
      item.className = 'gallery-item';
      item.innerHTML = `<img src="${src}" alt="Photo ${index + 1}" loading="lazy" onclick="openLightbox(${index})">`;
      grid.appendChild(item);
    });
    document.getElementById('totalCount').textContent = images.length;
  }

  function openLightbox(index) {
    currentImageIndex = index;
    document.getElementById('lightboxImg').src = images[index];
    document.getElementById('currentIndex').textContent = index + 1;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }

  function nextImage() {
    currentImageIndex = (currentImageIndex + 1) % images.length;
    document.getElementById('lightboxImg').src = images[currentImageIndex];
    document.getElementById('currentIndex').textContent = currentImageIndex + 1;
  }

  function prevImage() {
    currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
    document.getElementById('lightboxImg').src = images[currentImageIndex];
    document.getElementById('currentIndex').textContent = currentImageIndex + 1;
  }

  document.addEventListener('keydown', (e) => {
    if (document.getElementById('lightbox').classList.contains('active')) {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'ArrowLeft') prevImage();
    }
  });

  buildGallery();
</script>

</body>
</html>
